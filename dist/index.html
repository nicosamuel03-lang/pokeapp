<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <title>PokéVault</title>
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
    />
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)" />
    <script>
      (function(){
        var t=localStorage.getItem("pokevault-theme");
        var isDark=t!=="light";
        var el=document.documentElement;
        el.classList.remove("light","dark");
        el.classList.add(isDark?"dark":"light");
        document.documentElement.style.backgroundColor=isDark?"#000000":"#ffffff";
        document.querySelectorAll('meta[name="theme-color"]').forEach(function(m){ m.setAttribute("content",isDark?"#000000":"#ffffff"); });
      })();
    </script>
    <style>html.light, html.light body, html.light #root { background-color: #ffffff !important; min-height: 100%; } html.dark, html.dark body, html.dark #root { background-color: #000000 !important; min-height: 100%; }</style>
