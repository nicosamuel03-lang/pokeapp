<!doctype html>
<html lang="fr">
  <head>
    <script>
      (function(){
        var t=localStorage.getItem("pokevault-theme");
        var isDark=t!=="light";
        var el=document.documentElement;
        el.classList.remove("light","dark");
        el.classList.add(isDark?"dark":"light");
        var meta=document.querySelector('meta[name="theme-color"]');
        if(meta) meta.setAttribute("content",isDark?"#111111":"#ffffff");
      })();
    </script>
    <meta charset="UTF-8" />
    <title>PokéVault</title>
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
    />
    <meta name="theme-color" content="#111111" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="PokéVault" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&display=swap" rel="stylesheet" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon.png" />
    <link rel="apple-touch-icon" href="/icon.png" />
    <link rel="manifest" href="/manifest.json" />
  </head>
  <body class="text-slate-50">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
  </html>
