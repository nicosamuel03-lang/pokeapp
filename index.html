<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <!-- 1er script du document : thème avant React / avant tout autre script (évite flash) -->
    <script>
      (function () {
        try {
          var theme = localStorage.getItem("pokevault-theme");
          var el = document.documentElement;
          el.classList.remove("light", "dark");
          if (theme === "dark") {
            el.classList.add("dark");
            el.style.backgroundColor = "#0a0a0a";
          } else {
            el.classList.add("light");
            el.style.backgroundColor = "#ffffff";
          }
        } catch (e) {}
      })();
    </script>
    <title>PokéVault</title>
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
    />
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0a0a0a" media="(prefers-color-scheme: dark)" />
    <script>
      (function () {
        try {
          var theme = localStorage.getItem("pokevault-theme");
          var isDark = theme === "dark";
          document.querySelectorAll('meta[name="theme-color"]').forEach(function (m) {
            m.setAttribute("content", isDark ? "#0a0a0a" : "#ffffff");
          });
        } catch (e) {}
      })();
    </script>
    <style>html.light, html.light body, html.light #root { background-color: #ffffff !important; min-height: 100%; } html.dark, html.dark body, html.dark #root { background-color: #0a0a0a !important; min-height: 100%; }</style>
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="PokéVault" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon.png" />
    <link rel="apple-touch-icon" href="/icon.png" />
    <link rel="manifest" href="/manifest.json" />
  </head>
  <body class="text-slate-50">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
  </html>
